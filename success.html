<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enrollment — Hantrix Academy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','1563397922104537');fbq('track','PageView');</script>
  <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=1563397922104537&ev=PageView&noscript=1"/></noscript>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #F9F9F9; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; border-radius: 24px; border: 1px solid rgba(0,0,0,0.10); padding: 48px 40px; max-width: 480px; width: 100%; text-align: center; }
    .icon { width: 72px; height: 72px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; }
    .icon-success { background: #F7941D; }
    .icon-fail { background: #e53e3e; }
    .icon-loading { background: #e2e8f0; }
    h1 { font-size: 26px; font-weight: 700; color: #000; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { font-size: 15px; color: rgba(0,0,0,0.55); line-height: 1.6; margin-bottom: 32px; }
    .btn { display: inline-block; background: #F7941D; color: #fff; border-radius: 50px; padding: 14px 32px; font-size: 15px; font-weight: 600; font-family: 'Plus Jakarta Sans', sans-serif; text-decoration: none; }
    .btn-outline { background: none; border: 1px solid rgba(0,0,0,0.15); color: #000; }
    .spinner { width: 32px; height: 32px; border: 3px solid #ccc; border-top-color: #F7941D; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="icon icon-loading" id="icon">
      <div class="spinner"></div>
    </div>
    <h1 id="title">Verifying payment...</h1>
    <p id="msg">Please wait while we confirm your payment.</p>
    <div id="btn-area"></div>
  </div>

  <script>
    const WORKER_URL = 'https://cashfree-order.hantrixacademy.workers.dev';

    async function verify() {
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('order_id');

      if (!orderId) {
        showFail();
        return;
      }

      try {
        const res = await fetch(WORKER_URL + '?order_id=' + encodeURIComponent(orderId));
        const data = await res.json();

        if (data.status === 'PAID') {
          showSuccess();
        } else {
          showFail(data.status);
        }
      } catch (e) {
        showFail();
      }
    }

    function showSuccess() {
      fbq('track', 'Purchase', { value: 16999, currency: 'INR' });
      document.getElementById('icon').className = 'icon icon-success';
      document.getElementById('icon').innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
      document.getElementById('title').textContent = "You're Enrolled!";
      document.getElementById('msg').textContent = "Welcome to Hantrix Academy. Your payment was successful. Check your email for next steps and access details.";
      document.getElementById('btn-area').innerHTML = '<a href="https://checkout.hantrixacademy.com" class="btn">Back to Home</a>';
    }

    function showFail(status) {
      document.getElementById('icon').className = 'icon icon-fail';
      document.getElementById('icon').innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      document.getElementById('title').textContent = "Payment Incomplete";
      document.getElementById('msg').textContent = "Your payment was not completed. Please try again to enroll in Hantrix Academy.";
      document.getElementById('btn-area').innerHTML = '<a href="https://checkout.hantrixacademy.com" class="btn">Try Again</a>';
    }

    verify();
  </script>
</body>
</html>
